<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発注管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --border: #e8e4dc;
    --text: #2c2c2c;
    --muted: #888;
    --accent: #e8613a;
    --accent2: #3a7be8;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  #pw-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .pw-box { background: var(--surface); border-radius: 16px; padding: 40px; box-shadow: var(--shadow); text-align: center; width: 320px; }
  .pw-box h1 { font-size: 22px; margin-bottom: 8px; }
  .pw-box p { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .pw-box input { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; text-align: center; letter-spacing: 4px; margin-bottom: 12px; }
  .pw-box input:focus { border-color: var(--accent); }
  .pw-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: bold; }
  .pw-error { color: #e74c3c; font-size: 13px; margin-top: 8px; }

  header { background: #1a1a2e; color: white; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 700; }
  .header-btns { display: flex; gap: 10px; }
  .header-btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-new { background: var(--accent); color: white; }
  .btn-csv { background: rgba(255,255,255,0.15); color: white; }
  .btn-pdf { background: rgba(255,255,255,0.15); color: white; }

  .store-tabs { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 4px; overflow-x: auto; }
  .store-tab { padding: 14px 20px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--muted); border-bottom: 3px solid transparent; white-space: nowrap; transition: all 0.2s; }
  .store-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .store-tab-add { padding: 14px 16px; border: none; background: none; cursor: pointer; font-size: 20px; color: var(--muted); }

  .main { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  .order-list { display: flex; flex-direction: column; gap: 10px; }
  .order-row { background: var(--surface); border-radius: 12px; padding: 16px 20px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
  .order-row:hover { border-color: var(--accent2); }
  .order-row-left { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .order-date { font-size: 16px; font-weight: 700; }
  .order-delivery { font-size: 13px; color: var(--muted); }
  .order-count { font-size: 13px; color: var(--muted); }
  .order-row-btns { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .btn-sm { padding: 6px 12px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-del { padding: 6px 10px; background: none; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; cursor: pointer; color: var(--muted); transition: all 0.2s; }
  .btn-del:hover { border-color: #e74c3c; color: #e74c3c; background: #fee; }

  .detail-back { display: flex; align-items: center; gap: 8px; color: var(--accent2); cursor: pointer; font-size: 14px; font-weight: 600; margin-bottom: 16px; background: none; border: none; padding: 0; }
  .detail-info { background: var(--surface); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .detail-info-cols { display: flex; gap: 24px; flex-wrap: wrap; }
  .detail-info-col { display: flex; flex-direction: column; gap: 4px; }
  .detail-info-label { font-size: 11px; color: var(--muted); font-weight: 600; }
  .detail-info-val { font-size: 15px; font-weight: 700; }
  .btn-edit { padding: 8px 16px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600; }

  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .product-card { background: var(--surface); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); position: relative; }
  .product-img { width: 100%; height: 200px; object-fit: cover; display: block; }
  .product-no-img { width: 100%; height: 200px; background: var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; cursor: pointer; }
  .product-qty-badge { position: absolute; top: 10px; right: 10px; background: var(--accent); color: white; border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 700; }
  .product-img-btn { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; }
  .product-del-btn { position: absolute; top: 10px; left: 48px; background: rgba(231,76,60,0.9); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 15px; color: white; display: flex; align-items: center; justify-content: center; }
  .product-info { padding: 12px; }
  .product-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .product-price { color: var(--accent); font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .product-cost { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
  .product-qty-text { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .product-note { font-size: 12px; color: var(--muted); background: var(--bg); border-radius: 6px; padding: 4px 8px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
  .modal { background: var(--surface); border-radius: 20px; width: 100%; max-width: 700px; padding: 24px; margin: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .btn-close { background: var(--bg); border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 18px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--muted); }
  .form-group input, .form-group select { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; background: var(--bg); }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); background: white; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .items-list { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
  .item-row { background: var(--bg); border-radius: 12px; padding: 12px; display: grid; grid-template-columns: 64px 1fr auto; gap: 12px; align-items: start; }
  .item-img-wrap { width: 64px; height: 64px; border-radius: 8px; overflow: hidden; background: var(--border); cursor: pointer; position: relative; }
  .item-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .img-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; color: white; font-size: 11px; }
  .item-img-wrap:hover .img-overlay { opacity: 1; }
  .img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 11px; text-align: center; }
  .item-fields { display: flex; flex-direction: column; gap: 6px; }
  .item-fields input { padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; background: white; width: 100%; }
  .item-nums { display: flex; gap: 6px; flex-wrap: wrap; }
  .num-group { display: flex; flex-direction: column; gap: 3px; }
  .num-group label { font-size: 10px; color: var(--muted); font-weight: 600; }
  .num-group input { width: 80px; }
  .btn-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 22px; padding: 4px 8px; border-radius: 6px; }
  .btn-remove:hover { background: #fee; color: #e74c3c; }
  .btn-add-item { width: 100%; padding: 12px; border: 2px dashed var(--border); background: none; border-radius: 12px; color: var(--muted); cursor: pointer; font-size: 14px; }
  .btn-add-item:hover { border-color: var(--accent); color: var(--accent); }
  .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--bg); border: 1.5px solid var(--border); color: var(--text); }

  /* 画像アップロードモーダル */
  .img-upload-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: flex; align-items: center; justify-content: center; }
  .img-upload-box { background: white; border-radius: 16px; padding: 28px; width: 360px; text-align: center; }
  .img-upload-box h3 { margin-bottom: 16px; }
  .img-drop-area { border: 2px dashed var(--border); border-radius: 12px; padding: 28px 16px; cursor: pointer; margin-bottom: 12px; transition: all 0.2s; }
  .img-drop-area:hover, .img-drop-area.dragover { border-color: var(--accent); background: #fff5f2; }
  .img-preview { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; }
  .img-upload-btns { display: flex; gap: 8px; }
  .img-upload-progress { margin-top: 10px; font-size: 13px; color: var(--muted); }

  .add-store-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .add-store-box { background: white; border-radius: 16px; padding: 28px; width: 320px; text-align: center; }
  .add-store-box h3 { margin-bottom: 16px; font-size: 18px; }
  .add-store-box input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 12px; }
  .add-store-btns { display: flex; gap: 8px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #2c2c2c; color: white; padding: 12px 24px; border-radius: 100px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .history-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .print-header { display: none; }

  @media print {
    #pw-screen, header, .store-tabs, .detail-back, .btn-edit, .product-img-btn, .product-del-btn, .order-row-btns { display: none !important; }
    .product-cost { display: none !important; }
    body { background: white; }
    .main { padding: 0; }
    .print-header { display: block; margin-bottom: 20px; }
    .print-header h2 { font-size: 24px; }
  }
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .order-row { flex-direction: column; align-items: flex-start; gap: 10px; }
  }
</style>
</head>
<body>

<div id="pw-screen">
  <div class="pw-box">
    <h1>🐾 発注管理</h1>
    <p>パスワードを入力してください</p>
    <input type="password" id="pw-input" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">ログイン</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

<header>
  <h1>📦 発注管理</h1>
  <div class="header-btns" id="header-btns">
    <button class="header-btn btn-new" onclick="openNewOrderModal()">＋ 新規発注</button>
    <button class="header-btn btn-csv" onclick="exportAllCSV()">↓ CSV</button>
  </div>
</header>

<div class="store-tabs" id="store-tabs"></div>
<div class="main" id="main-content"></div>

<!-- 新規発注モーダル -->
<div class="modal-overlay" id="order-modal" style="display:none;" onclick="if(event.target===this)closeOrderModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="order-modal-title">新規発注</div>
      <button class="btn-close" onclick="closeOrderModal()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group"><label>店舗</label><select id="modal-store"></select></div>
      <div class="form-group"><label>発注日</label><input type="date" id="modal-order-date"></div>
      <div class="form-group"><label>納品予定日</label><input type="date" id="modal-delivery-date"></div>
    </div>
    <div style="font-size:14px; font-weight:700; margin-bottom:12px;">商品リスト</div>
    <div class="items-list" id="modal-items-list"></div>
    <button class="btn-add-item" onclick="addModalItem()">＋ 商品を追加</button>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
      <button class="btn btn-secondary" onclick="closeOrderModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="submitOrder()">登録する</button>
    </div>
  </div>
</div>

<!-- 画像アップロードモーダル -->
<div class="img-upload-modal" id="img-modal" style="display:none;">
  <div class="img-upload-box">
    <h3>📷 商品画像</h3>
    <div id="img-preview-wrap"></div>
    <div class="img-drop-area" id="img-drop-area"
      onclick="document.getElementById('img-file-input').click()"
      ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <input type="file" id="img-file-input" accept="image/*" style="display:none" onchange="onImgSelected(event)">
      <div>📁 クリックまたは画像をドラッグ＆ドロップ</div>
      <div style="font-size:12px; color:var(--muted); margin-top:6px;">JPG / PNG / WebP（自動で圧縮されます）</div>
    </div>
    <div class="img-upload-btns">
      <button class="btn btn-secondary" style="flex:1" onclick="closeImgModal()">キャンセル</button>
      <button class="btn btn-primary" style="flex:1" onclick="uploadImg()">アップロード</button>
    </div>
    <div class="img-upload-progress" id="img-upload-status"></div>
  </div>
</div>

<!-- 店舗追加モーダル -->
<div class="add-store-modal" id="add-store-modal" style="display:none;">
  <div class="add-store-box">
    <h3>店舗を追加</h3>
    <input type="text" id="new-store-name" placeholder="店舗名を入力">
    <div class="add-store-btns">
      <button class="btn btn-secondary" style="flex:1" onclick="closeAddStoreModal()">キャンセル</button>
      <button class="btn btn-primary" style="flex:1" onclick="addStore()">追加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://qhwaysfpcovfnddzrtga.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6EvT-X1fC2IkW5ec9vo4hw_N-NukmFQ';
const PASSWORD = 'moffuorder2026';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let stores = [], currentStoreId = null, currentOrders = [], currentOrderDetail = null;
let modalItems = [], currentImgItemIdx = null, selectedImgFile = null, imgTargetContext = null, editingOrderId = null;

function checkPw() {
  if (document.getElementById('pw-input').value === PASSWORD) {
    sessionStorage.setItem('auth','1');
    document.getElementById('pw-screen').style.display = 'none';
    init();
  } else { document.getElementById('pw-error').textContent = 'パスワードが違います'; }
}
if (sessionStorage.getItem('auth')==='1') {
  document.getElementById('pw-screen').style.display='none';
  window.addEventListener('DOMContentLoaded', init);
}

async function init() {
  document.getElementById('modal-order-date').value = new Date().toISOString().slice(0,10);
  await loadStores();
  setInterval(()=>{ if(!currentOrderDetail) loadOrders(); }, 30000);
}

async function loadStores() {
  const {data} = await db.from('stores').select('*').order('name');
  stores = data||[];
  document.getElementById('modal-store').innerHTML = stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  if(stores.length){ currentStoreId=stores[0].id; renderStoreTabs(); await loadOrders(); }
}

function renderStoreTabs() {
  document.getElementById('store-tabs').innerHTML = stores.map(s=>
    `<button class="store-tab ${s.id===currentStoreId?'active':''}" onclick="selectStore('${s.id}')">${s.name}</button>`
  ).join('') + `<button class="store-tab-add" onclick="openAddStoreModal()">＋</button>`;
}

async function selectStore(id) { currentStoreId=id; currentOrderDetail=null; renderStoreTabs(); await loadOrders(); }

async function loadOrders() {
  const {data} = await db.from('orders').select('*, order_items(*)').eq('store_id',currentStoreId).order('order_date',{ascending:false});
  currentOrders = data||[];
  if(currentOrderDetail) { const o=currentOrders.find(o=>o.id===currentOrderDetail.id); if(o) openDetail(o.id); else renderOrderList(); }
  else renderOrderList();
}

function renderOrderList() {
  setHeaderBtns('list');
  const el = document.getElementById('main-content');
  if(!currentOrders.length){ el.innerHTML='<div class="loading">発注履歴がありません</div>'; return; }
  el.innerHTML = `<div class="history-title">発注履歴</div><div class="order-list">${currentOrders.map(o=>{
    const its=o.order_items||[], total=its.reduce((s,i)=>s+i.qty,0);
    return `<div class="order-row" onclick="openDetail('${o.id}')">
      <div class="order-row-left">
        <div class="order-date">${fmt(o.order_date)}</div>
        <div class="order-delivery">納品予定：${fmt(o.delivery_date)}</div>
        <div class="order-count">${its.length}種 / ${total}個</div>
      </div>
      <div class="order-row-btns" onclick="event.stopPropagation()">
        <button class="btn-sm" onclick="printOrder('${o.id}')">🖨 PDF</button>
        <button class="btn-sm" onclick="exportOrderCSV('${o.id}')">↓ CSV</button>
        <button class="btn-del" onclick="deleteOrder('${o.id}')">🗑</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function openDetail(orderId) {
  const order=currentOrders.find(o=>o.id===orderId); if(!order) return;
  currentOrderDetail=order;
  const its=(order.order_items||[]).sort((a,b)=>a.sort_order-b.sort_order);
  const total=its.reduce((s,i)=>s+i.qty,0);
  const store=stores.find(s=>s.id===order.store_id);
  setHeaderBtns('detail', orderId);
  document.getElementById('main-content').innerHTML = `
    <div class="print-header"><h2>${store?.name} 発注サマリー ${fmt(order.order_date)}</h2></div>
    <button class="detail-back" onclick="backToList()">← 発注履歴に戻る</button>
    <div class="detail-info">
      <div class="detail-info-cols">
        <div class="detail-info-col"><div class="detail-info-label">店舗</div><div class="detail-info-val">${store?.name}</div></div>
        <div class="detail-info-col"><div class="detail-info-label">発注日</div><div class="detail-info-val">${fmt(order.order_date)}</div></div>
        <div class="detail-info-col"><div class="detail-info-label">納品予定日</div><div class="detail-info-val">${fmt(order.delivery_date)}</div></div>
        <div class="detail-info-col"><div class="detail-info-label">商品種類</div><div class="detail-info-val">${its.length}種</div></div>
        <div class="detail-info-col"><div class="detail-info-label">総個数</div><div class="detail-info-val">${total}個</div></div>
      </div>
      <button class="btn-edit" onclick="openEditOrderModal('${orderId}')">✏️ 編集</button>
    </div>
    <div class="products-grid">${its.map(item=>`
      <div class="product-card">
        ${item.img?`<img class="product-img" src="${item.img}" alt="${esc(item.name)}">`:`<div class="product-no-img" onclick="openImgModalDetail('${item.id}')">📷 画像を追加</div>`}
        <div class="product-qty-badge">${item.qty}個</div>
        <button class="product-img-btn" onclick="openImgModalDetail('${item.id}')">🔄</button>
        <button class="product-del-btn" onclick="deleteItem('${item.id}')">✕</button>
        <div class="product-info">
          <div class="product-name">${esc(item.name)}</div>
          <div class="product-price">¥${(item.price||0).toLocaleString()}</div>
          <div class="product-cost">原価：¥${(item.cost||0).toLocaleString()}</div>
          <div class="product-qty-text">発注数：${item.qty}個</div>
          ${item.note?`<div class="product-note">📝 ${esc(item.note)}</div>`:''}
        </div>
      </div>`).join('')}
    </div>`;
}

function setHeaderBtns(mode, orderId) {
  if(mode==='detail') {
    document.getElementById('header-btns').innerHTML = `
      <button class="header-btn btn-new" onclick="openAddItemToOrder('${orderId}')">＋ 商品を追加</button>
      <button class="header-btn btn-pdf" onclick="window.print()">🖨 PDF</button>`;
  } else {
    document.getElementById('header-btns').innerHTML = `
      <button class="header-btn btn-new" onclick="openNewOrderModal()">＋ 新規発注</button>
      <button class="header-btn btn-csv" onclick="exportAllCSV()">↓ CSV</button>`;
  }
}

function backToList() { currentOrderDetail=null; setHeaderBtns('list'); renderOrderList(); }

function openNewOrderModal() {
  editingOrderId=null; modalItems=[];
  document.getElementById('order-modal-title').textContent='新規発注';
  document.getElementById('modal-store').value=currentStoreId||'';
  document.getElementById('modal-order-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('modal-delivery-date').value='';
  addModalItem();
  document.getElementById('order-modal').style.display='flex';
}

function openEditOrderModal(orderId) {
  const order=currentOrders.find(o=>o.id===orderId); if(!order) return;
  editingOrderId=orderId; modalItems=(order.order_items||[]).map(i=>({...i}));
  document.getElementById('order-modal-title').textContent='発注を編集';
  document.getElementById('modal-store').value=order.store_id;
  document.getElementById('modal-order-date').value=order.order_date;
  document.getElementById('modal-delivery-date').value=order.delivery_date||'';
  renderModalItems();
  document.getElementById('order-modal').style.display='flex';
}

function openAddItemToOrder(orderId) {
  const order=currentOrders.find(o=>o.id===orderId); if(!order) return;
  editingOrderId='add:'+orderId; modalItems=[];
  document.getElementById('order-modal-title').textContent='商品を追加';
  document.getElementById('modal-store').value=order.store_id;
  document.getElementById('modal-order-date').value=order.order_date;
  document.getElementById('modal-delivery-date').value=order.delivery_date||'';
  addModalItem();
  document.getElementById('order-modal').style.display='flex';
}

function closeOrderModal() { document.getElementById('order-modal').style.display='none'; }
function addModalItem() { modalItems.push({id:genId(),name:'',qty:1,price:0,cost:0,note:'',img:null}); renderModalItems(); }
function removeModalItem(i) { modalItems.splice(i,1); renderModalItems(); }

function renderModalItems() {
  document.getElementById('modal-items-list').innerHTML = modalItems.map((item,i)=>`
    <div class="item-row">
      <div class="item-img-wrap" onclick="openImgModalNew(${i})">
        ${item.img?`<img src="${item.img}" alt="">`:`<div class="img-placeholder">📷<br>タップ</div>`}
        <div class="img-overlay">変更</div>
      </div>
      <div class="item-fields">
        <input type="text" placeholder="商品名" value="${esc(item.name)}" oninput="modalItems[${i}].name=this.value">
        <div class="item-nums">
          <div class="num-group"><label>個数</label><input type="number" value="${item.qty}" min="1" oninput="modalItems[${i}].qty=+this.value"></div>
          <div class="num-group"><label>販売価格</label><input type="number" value="${item.price}" min="0" oninput="modalItems[${i}].price=+this.value"></div>
          <div class="num-group"><label>原価</label><input type="number" value="${item.cost}" min="0" oninput="modalItems[${i}].cost=+this.value"></div>
        </div>
        <input type="text" placeholder="📝 備考" value="${esc(item.note)}" oninput="modalItems[${i}].note=this.value">
      </div>
      <button class="btn-remove" onclick="removeModalItem(${i})">×</button>
    </div>`).join('');
}

async function submitOrder() {
  const storeId=document.getElementById('modal-store').value;
  const orderDate=document.getElementById('modal-order-date').value;
  const deliveryDate=document.getElementById('modal-delivery-date').value;
  if(!storeId||!orderDate){showToast('店舗と発注日を入力してください');return;}
  if(modalItems.filter(i=>i.name).length===0){showToast('商品を入力してください');return;}

  if(editingOrderId && editingOrderId.startsWith('add:')) {
    const oid=editingOrderId.replace('add:','');
    const order=currentOrders.find(o=>o.id===oid);
    const baseSort=(order?.order_items?.length||0);
    const newItems=modalItems.filter(i=>i.name).map((item,i)=>({id:item.id,order_id:oid,name:item.name,qty:item.qty,price:item.price,cost:item.cost,img:item.img||null,note:item.note,sort_order:baseSort+i}));
    await db.from('order_items').insert(newItems);
  } else if(editingOrderId) {
    await db.from('orders').update({store_id:storeId,order_date:orderDate,delivery_date:deliveryDate}).eq('id',editingOrderId);
    await db.from('order_items').delete().eq('order_id',editingOrderId);
    const items=modalItems.filter(i=>i.name).map((item,i)=>({id:genId(),order_id:editingOrderId,name:item.name,qty:item.qty,price:item.price,cost:item.cost,img:item.img||null,note:item.note,sort_order:i}));
    await db.from('order_items').insert(items);
  } else {
    const orderId=genId();
    await db.from('orders').insert({id:orderId,store_id:storeId,order_date:orderDate,delivery_date:deliveryDate});
    const items=modalItems.filter(i=>i.name).map((item,i)=>({id:item.id,order_id:orderId,name:item.name,qty:item.qty,price:item.price,cost:item.cost,img:item.img||null,note:item.note,sort_order:i}));
    await db.from('order_items').insert(items);
  }
  closeOrderModal();
  showToast('✅ 保存しました！');
  currentStoreId=storeId;
  const prevDetail=currentOrderDetail;
  currentOrderDetail=null;
  await loadOrders();
  if(prevDetail) openDetail(prevDetail.id);
}

async function deleteOrder(orderId) {
  if(!confirm('この発注を削除しますか？'))return;
  await db.from('order_items').delete().eq('order_id',orderId);
  await db.from('orders').delete().eq('id',orderId);
  showToast('削除しました');
  currentOrderDetail=null;
  await loadOrders();
}

async function deleteItem(itemId) {
  if(!confirm('この商品を削除しますか？'))return;
  await db.from('order_items').delete().eq('id',itemId);
  showToast('削除しました');
  const oid=currentOrderDetail?.id;
  currentOrderDetail=null;
  await loadOrders();
  if(oid) openDetail(oid);
}

// ---- 画像アップロード ----
function openImgModalNew(idx) {
  imgTargetContext='modal'; currentImgItemIdx=idx; selectedImgFile=null;
  document.getElementById('img-file-input').value='';
  document.getElementById('img-preview-wrap').innerHTML=modalItems[idx].img?`<img class="img-preview" src="${modalItems[idx].img}">`:'' ;
  document.getElementById('img-upload-status').textContent='';
  document.getElementById('img-modal').style.display='flex';
}

function openImgModalDetail(itemId) {
  imgTargetContext='detail'; currentImgItemIdx=itemId; selectedImgFile=null;
  document.getElementById('img-file-input').value='';
  const item=currentOrderDetail?.order_items?.find(i=>i.id===itemId);
  document.getElementById('img-preview-wrap').innerHTML=item?.img?`<img class="img-preview" src="${item.img}">`:'' ;
  document.getElementById('img-upload-status').textContent='';
  document.getElementById('img-modal').style.display='flex';
}

function closeImgModal() { document.getElementById('img-modal').style.display='none'; }

// ドラッグ&ドロップ
function onDragOver(e) { e.preventDefault(); document.getElementById('img-drop-area').classList.add('dragover'); }
function onDragLeave(e) { document.getElementById('img-drop-area').classList.remove('dragover'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('img-drop-area').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if(file && file.type.startsWith('image/')) processImgFile(file);
}

function onImgSelected(e) {
  const file = e.target.files[0];
  if(file) processImgFile(file);
}

function processImgFile(file) {
  selectedImgFile = file;
  // プレビュー表示
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('img-preview-wrap').innerHTML = `<img class="img-preview" src="${e.target.result}">`;
  };
  reader.readAsDataURL(file);
}

// 画像を圧縮してBlobを返す
function compressImage(file, maxWidth=1200, quality=0.82) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if(w > maxWidth){ h = Math.round(h * maxWidth / w); w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(resolve, 'image/jpeg', quality);
    };
    img.src = url;
  });
}

async function uploadImg() {
  if(!selectedImgFile){ closeImgModal(); return; }
  const status = document.getElementById('img-upload-status');
  status.textContent = '圧縮中...';
  const compressed = await compressImage(selectedImgFile);
  status.textContent = 'アップロード中...';
  const path = `products/${genId()}.jpg`;
  const {error} = await db.storage.from('product-images').upload(path, compressed, {upsert:true, contentType:'image/jpeg'});
  if(error){ status.textContent='エラー: '+error.message; return; }
  const {data} = db.storage.from('product-images').getPublicUrl(path);
  const url = data.publicUrl;

  if(imgTargetContext==='modal') {
    modalItems[currentImgItemIdx].img = url; renderModalItems();
  } else {
    await db.from('order_items').update({img:url}).eq('id',currentImgItemIdx);
    const oid=currentOrderDetail?.id;
    currentOrderDetail=null;
    await loadOrders();
    if(oid) openDetail(oid);
  }
  closeImgModal();
  showToast('画像をアップロードしました');
}

// ---- 店舗追加 ----
function openAddStoreModal(){ document.getElementById('add-store-modal').style.display='flex'; document.getElementById('new-store-name').value=''; }
function closeAddStoreModal(){ document.getElementById('add-store-modal').style.display='none'; }
async function addStore(){
  const name=document.getElementById('new-store-name').value.trim(); if(!name)return;
  await db.from('stores').insert({id:genId(),name});
  closeAddStoreModal(); await loadStores();
}

// ---- CSV・印刷 ----
function exportOrderCSV(orderId){
  const order=currentOrders.find(o=>o.id===orderId); if(!order)return;
  const store=stores.find(s=>s.id===order.store_id);
  const rows=[['商品名','個数','販売価格','原価','備考']];
  (order.order_items||[]).forEach(i=>rows.push([i.name,i.qty,i.price,i.cost,i.note||'']));
  dlCSV(rows,`発注_${store?.name}_${order.order_date}`);
}

function exportAllCSV(){
  const rows=[['発注ID','店舗','発注日','納品予定日','商品名','個数','販売価格','原価','備考']];
  currentOrders.forEach(o=>{
    const store=stores.find(s=>s.id===o.store_id);
    (o.order_items||[]).forEach(i=>rows.push([o.id,store?.name||'',o.order_date,o.delivery_date||'',i.name,i.qty,i.price,i.cost,i.note||'']));
  });
  dlCSV(rows,`発注履歴_${new Date().toISOString().slice(0,10)}`);
}

function printOrder(orderId){
  const oid=currentOrderDetail?.id;
  if(oid!==orderId){openDetail(orderId);setTimeout(window.print,500);}
  else window.print();
}

function dlCSV(rows,name){
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`${name}.csv`; a.click();
}

function fmt(d){if(!d)return '未定';const dt=new Date(d);return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;}
function genId(){return 'mn'+Math.random().toString(36).slice(2,12);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
