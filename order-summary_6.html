<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発注管理</title>
<style>
:root {
  --primary: #1a1a2e;
  --accent: #4f8ef7;
  --accent-light: #eef3fe;
  --bg: #f4f6fb;
  --card: #fff;
  --border: #e2e8f0;
  --text: #1a202c;
  --muted: #8896ab;
  --danger: #e53e3e;
  --green: #38a169;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  background: var(--primary); color: #fff;
  padding: 14px 20px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 15px; font-weight: 700; letter-spacing: .04em; margin-right: auto; }
.hbtns { display: flex; gap: 6px; flex-wrap: wrap; }

.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 7px 13px; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; transition: transform .1s, opacity .15s;
  white-space: nowrap; font-family: inherit;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,.4); }
.btn-outline:hover { background: rgba(255,255,255,.08); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); font-family: inherit; }
.btn-ghost:hover { background: var(--bg); }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 6px; }

.store-bar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: flex-end; gap: 0; overflow-x: auto;
}
.store-tab {
  padding: 11px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  border: none; background: transparent; color: var(--muted);
  border-bottom: 2.5px solid transparent; white-space: nowrap;
  font-family: inherit; transition: color .15s, border-color .15s;
}
.store-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.store-tab:hover:not(.active) { color: var(--text); }
.store-add-tab {
  padding: 11px 12px; font-size: 18px; cursor: pointer;
  border: none; background: transparent; color: var(--muted);
  font-family: inherit; line-height: 1;
}
.store-add-tab:hover { color: var(--accent); }

main { padding: 20px; max-width: 900px; margin: 0 auto; }

/* loading */
.loading-wrap { display: flex; align-items: center; justify-content: center; padding: 80px 20px; }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.history-header h2 { font-size: 14px; font-weight: 700; }

.order-list { display: flex; flex-direction: column; gap: 10px; }
.order-row {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  cursor: pointer; transition: box-shadow .18s;
}
.order-row:hover { box-shadow: 0 2px 12px rgba(79,142,247,.1); }
.order-row-date { font-size: 14px; font-weight: 700; min-width: 130px; }
.order-row-meta { font-size: 12px; color: var(--muted); }
.order-row-count { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; }
.order-row-actions { display: flex; gap: 6px; }

.detail-back {
  display: flex; align-items: center; gap: 8px; margin-bottom: 16px; cursor: pointer;
  color: var(--accent); font-size: 13px; font-weight: 600; width: fit-content;
}
.detail-back:hover { opacity: .75; }

.order-meta-bar {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 20px; margin-bottom: 18px;
  display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
}
.meta-field { display: flex; flex-direction: column; gap: 2px; }
.meta-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }
.meta-value { font-size: 14px; font-weight: 700; }

.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 13px; }
.product-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; }
.card-actions { position: absolute; top: 6px; right: 6px; display: flex; gap: 3px; z-index: 10; }
.icon-btn {
  width: 27px; height: 27px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn-edit { background: rgba(255,255,255,.95); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.15); }
.icon-btn-del  { background: var(--danger); color: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.15); }

.product-img-wrap {
  width: 100%; aspect-ratio: 1/1; background: var(--bg);
  display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
}
.product-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.no-img { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #c0cce0; font-size: 11px; }
.no-img svg { width: 32px; height: 32px; opacity: .4; }
.qty-badge {
  position: absolute; bottom: 7px; right: 7px;
  background: rgba(255,255,255,.95); color: #1a202c;
  font-size: 11px; font-weight: 700; border-radius: 14px; padding: 2px 9px;
  border: 1px solid rgba(0,0,0,.08);
}
.product-body { padding: 9px 11px 11px; }
.product-name  { font-size: 12px; font-weight: 700; line-height: 1.3; }
.product-price-label { font-size: 9px; color: var(--muted); font-weight: 600; letter-spacing: .04em; margin-top: 5px; }
.product-price { font-size: 12px; color: var(--accent); font-weight: 700; margin-top: 1px; }
.product-cost  { font-size: 10px; color: var(--muted); margin-top: 3px; }
.product-qty   { font-size: 11px; color: var(--text); font-weight: 600; margin-top: 3px; }
.product-note  { font-size: 10px; color: var(--muted); margin-top: 5px; background: var(--bg); border-radius: 5px; padding: 3px 6px; line-height: 1.4; }

.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); grid-column: 1/-1; }
.empty-state .eicon { font-size: 40px; margin-bottom: 10px; }
.empty-state p { font-size: 13px; line-height: 1.7; }

/* toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: #1a202c; color: #fff; padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 600; z-index: 500;
  transition: transform .3s; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* MODAL */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.46); z-index: 300;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--card); border-radius: 16px;
  padding: 22px 22px 18px; width: 93%; max-width: 420px;
  max-height: 92vh; overflow-y: auto;
}
.modal h2 { font-size: 15px; font-weight: 700; margin-bottom: 15px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; letter-spacing:.05em; }
.form-group input[type=text],
.form-group input[type=number],
.form-group input[type=date],
.form-group textarea {
  width: 100%; border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 10px; font-size: 14px; font-family: inherit;
  background: var(--bg); color: var(--text); outline: none; transition: border .15s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--accent); background: #fff; }
.form-group textarea { resize: vertical; min-height: 50px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

.img-upload-area {
  border: 1.5px dashed var(--border); border-radius: 10px;
  padding: 14px; text-align: center; cursor: pointer;
  background: var(--bg); position: relative; transition: border-color .15s, background .15s;
}
.img-upload-area:hover { border-color: var(--accent); background: var(--accent-light); }
.img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-label { font-size: 12px; color: var(--muted); pointer-events: none; line-height: 1.6; }
.upload-label strong { color: var(--accent); }
.img-preview-wrap { margin-top: 8px; display: none; position: relative; }
.img-preview-wrap img { width: 100%; max-height: 120px; object-fit: contain; border-radius: 8px; border: 1px solid var(--border); }
.img-clear-btn {
  position: absolute; top: 4px; right: 4px;
  background: rgba(0,0,0,.55); color: #fff; border: none;
  border-radius: 50%; width: 20px; height: 20px; font-size: 11px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.cost-note { font-size: 10px; color: var(--muted); margin-top: 4px; }

/* CSV filter */
.store-check-list { display: flex; flex-direction: column; gap: 8px; }
.store-check-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
}
.store-check-item:hover { background: var(--bg); }
.store-check-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
.store-check-item label { font-size: 13px; font-weight: 600; cursor: pointer; flex: 1; }
.filter-section { margin-bottom: 16px; }
.filter-section h3 { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .05em; margin-bottom: 8px; text-transform: uppercase; }
.csv-preview { font-size: 12px; color: var(--muted); margin-top: 12px; padding: 10px 12px; background: var(--bg); border-radius: 8px; line-height: 1.6; }
.csv-preview strong { color: var(--accent); font-size: 13px; }

/* PRINT */
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  header, .store-bar, .hbtns, .card-actions, .detail-back,
  .order-meta-bar button, .overlay, .history-header button, .toast { display: none !important; }
  body { background: #fff !important; }
  main { padding: 0; max-width: 100%; }
  .order-list { display: none !important; }
  .product-cost { display: none !important; }
  .order-meta-bar { border: 1.5px solid #cbd5e0 !important; margin-bottom: 14px !important; }
  .product-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 8px !important; }
  .product-card { border: 1.5px solid #cbd5e0 !important; break-inside: avoid; }
  .print-only { display: block !important; }
}
.print-only { display: none; padding-bottom: 14px; margin-bottom: 16px; border-bottom: 2px solid #1a1a2e; font-size: 16pt; font-weight: 700; }

@media (max-width: 600px) {
  header, main { padding-left: 14px; padding-right: 14px; }
  .store-bar { padding: 0 14px; }
  .product-grid { grid-template-columns: repeat(2, 1fr); }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- パスワード画面 -->
<div id="pw-screen" style="display:flex;position:fixed;inset:0;background:#1a1a2e;z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:32px 28px;width:90%;max-width:340px;text-align:center;">
    <div style="font-size:36px;margin-bottom:12px;">📦</div>
    <h2 style="font-size:16px;font-weight:700;margin-bottom:6px;">発注管理システム</h2>
    <p style="font-size:12px;color:#8896ab;margin-bottom:20px;">パスワードを入力してください</p>
    <input type="password" id="pw-input" placeholder="パスワード"
      style="width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:14px;outline:none;margin-bottom:10px;font-family:inherit;">
    <div id="pw-error" style="font-size:12px;color:#e53e3e;margin-bottom:8px;display:none;">パスワードが違います</div>
    <button id="pw-btn"
      style="width:100%;background:#4f8ef7;color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">
      ログイン
    </button>
  </div>
</div>

<header>
  <h1>📦 発注管理</h1>
  <div class="hbtns" id="header-btns"></div>
</header>
<div class="store-bar" id="store-bar">
  <button class="store-add-tab" id="btn-add-store" title="店舗を追加">＋</button>
</div>
<main id="main-area"><div class="loading-wrap"><div class="spinner"></div></div></main>

<div class="toast" id="toast"></div>

<!-- 商品追加・編集 -->
<div class="overlay" id="item-overlay">
  <div class="modal">
    <h2 id="item-modal-title">商品を追加</h2>
    <div class="form-group"><label>商品名 *</label><input type="text" id="f-name" placeholder="例：ボールペン（黒）"></div>
    <div class="form-row-3">
      <div class="form-group"><label>発注個数 *</label><input type="number" id="f-qty" min="1" placeholder="1"></div>
      <div class="form-group"><label>販売価格（円）</label><input type="number" id="f-price" min="0" placeholder="0"></div>
      <div class="form-group">
        <label>原価（円）</label>
        <input type="number" id="f-cost" min="0" placeholder="0">
        <div class="cost-note">※PDFには出力されません</div>
      </div>
    </div>
    <div class="form-group">
      <label>商品画像（任意）</label>
      <div class="img-upload-area" id="upload-area">
        <input type="file" accept="image/*" id="f-img-file">
        <div class="upload-label">📷 <strong>タップして選択</strong><br>カメラロールからもOK</div>
      </div>
      <div class="img-preview-wrap" id="img-preview-wrap">
        <img id="img-preview" src="" alt="preview">
        <button class="img-clear-btn" id="btn-img-clear">×</button>
      </div>
    </div>
    <div class="form-group"><label>備考・メモ（任意）</label><textarea id="f-note" placeholder="色・サイズ・規格など"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-item-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-item-submit">追加する</button>
    </div>
  </div>
</div>

<!-- 発注情報 -->
<div class="overlay" id="order-overlay">
  <div class="modal">
    <h2 id="order-modal-title">新規発注</h2>
    <div class="form-row">
      <div class="form-group"><label>発注日 *</label><input type="date" id="fo-date"></div>
      <div class="form-group"><label>納品予定日</label><input type="date" id="fo-delivery"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-order-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-order-submit">作成する</button>
    </div>
  </div>
</div>

<!-- 店舗追加 -->
<div class="overlay" id="store-overlay">
  <div class="modal">
    <h2>店舗を追加</h2>
    <div class="form-group"><label>店舗名 *</label><input type="text" id="fs-name" placeholder="例：渋谷店"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-store-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-store-submit">追加する</button>
    </div>
  </div>
</div>

<!-- 絞り込みCSV -->
<div class="overlay" id="csv-overlay">
  <div class="modal">
    <h2>CSV出力　絞り込み</h2>
    <div class="filter-section">
      <h3>対象店舗</h3>
      <div class="store-check-list" id="csv-store-checks"></div>
    </div>
    <div class="filter-section">
      <h3>期間</h3>
      <div class="form-row">
        <div class="form-group"><label>開始日</label><input type="date" id="csv-date-from"></div>
        <div class="form-group"><label>終了日</label><input type="date" id="csv-date-to"></div>
      </div>
    </div>
    <div class="csv-preview" id="csv-preview">条件を選択してください</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-csv-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-csv-exec">⬇ CSVをダウンロード</button>
    </div>
  </div>
</div>

<script>
(function () {

/* ══════════════════════════════════════
   SUPABASE CONFIG
══════════════════════════════════════ */
var SB_URL = 'https://qhwaysfpcovfnddzrtga.supabase.co';
var SB_KEY = 'sb_publishable_6EvT-X1fC2IkW5ec9vo4hw_N-NukmFQ';

function sbFetch(path, opts) {
  opts = opts || {};
  var headers = Object.assign({
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  }, opts.headers || {});
  return fetch(SB_URL + '/rest/v1/' + path, Object.assign({}, opts, { headers: headers }))
    .then(function(r) {
      if (!r.ok) return r.text().then(function(t){ throw new Error(t); });
      var ct = r.headers.get('content-type') || '';
      return ct.indexOf('json') >= 0 ? r.json() : r.text().then(function(){ return []; });
    });
}

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
var db = { stores: [], orders: [] };
var currentStoreId = null;
var currentOrderId = null;
var pendingImg = null;
var editingItemId = null;

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(str) {
  if (!str) return '未設定';
  var p = str.split('-');
  return p[0] + '年' + parseInt(p[1]) + '月' + parseInt(p[2]) + '日';
}
function fmtPrice(n) { return n ? '¥' + Number(n).toLocaleString('ja-JP') : ''; }

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}
function showLoading() {
  document.getElementById('main-area').innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
}

/* ══════════════════════════════════════
   LOAD DATA FROM SUPABASE
══════════════════════════════════════ */
function loadAll() {
  showLoading();
  return Promise.all([
    sbFetch('stores?order=name'),
    sbFetch('orders?order=order_date.desc'),
    sbFetch('order_items?order=sort_order')
  ]).then(function(results) {
    var stores = results[0];
    var orders = results[1];
    var items  = results[2];

    db.stores = stores.map(function(s){ return { id: s.id, name: s.name }; });
    db.orders = orders.map(function(o){
      return {
        id: o.id,
        storeId: o.store_id,
        orderDate: o.order_date,
        deliveryDate: o.delivery_date,
        items: items.filter(function(i){ return i.order_id === o.id; }).map(function(i){
          return { id: i.id, name: i.name, qty: i.qty, price: i.price, cost: i.cost, img: i.img||'', note: i.note||'' };
        })
      };
    });

    if (!currentStoreId && db.stores.length > 0) currentStoreId = db.stores[0].id;
    renderStoreTabs();
    renderMain();
  }).catch(function(e){
    document.getElementById('main-area').innerHTML =
      '<div class="empty-state"><div class="eicon">⚠️</div><p>データの読み込みに失敗しました<br>SQLテーブルの作成が完了しているか確認してください<br><small>' + e.message + '</small></p></div>';
  });
}

/* ══════════════════════════════════════
   STORE TABS
══════════════════════════════════════ */
function renderStoreTabs() {
  var bar = document.getElementById('store-bar');
  Array.from(bar.querySelectorAll('.store-tab')).forEach(function(el){ el.remove(); });
  var addBtn = document.getElementById('btn-add-store');
  db.stores.forEach(function(store) {
    var tab = document.createElement('button');
    tab.className = 'store-tab' + (store.id === currentStoreId ? ' active' : '');
    tab.textContent = store.name;
    tab.addEventListener('click', function() {
      currentStoreId = store.id;
      currentOrderId = null;
      renderStoreTabs();
      renderMain();
    });
    bar.insertBefore(tab, addBtn);
  });
}

/* ══════════════════════════════════════
   MAIN RENDER
══════════════════════════════════════ */
function renderMain() {
  var area = document.getElementById('main-area');
  var hbtns = document.getElementById('header-btns');
  hbtns.innerHTML = ''; area.innerHTML = '';

  if (!currentStoreId) {
    area.innerHTML = '<div class="empty-state" style="padding:80px 20px"><div class="eicon">🏪</div><p>「＋」ボタンから店舗を追加してください</p></div>';
    return;
  }
  if (currentOrderId) renderDetail(area, hbtns);
  else renderList(area, hbtns);
}

/* ── LIST ── */
function renderList(area, hbtns) {
  var newBtn = document.createElement('button');
  newBtn.className = 'btn btn-primary btn-sm'; newBtn.textContent = '＋ 新規発注';
  newBtn.addEventListener('click', openNewOrderModal);
  hbtns.appendChild(newBtn);

  var csvBtn = document.createElement('button');

function buildCard(item, orderId) {
  var card = document.createElement('div'); card.className = 'product-card';
  var actions = document.createElement('div'); actions.className = 'card-actions';

  var editBtn = document.createElement('button');
  editBtn.className = 'icon-btn icon-btn-edit'; editBtn.setAttribute('type','button'); editBtn.textContent = '✏';
  editBtn.addEventListener('click', function(e){ e.stopPropagation(); openEditItemModal(orderId, item.id); });

  var delBtn = document.createElement('button');
  delBtn.className = 'icon-btn icon-btn-del'; delBtn.setAttribute('type','button'); delBtn.textContent = '×';
  delBtn.addEventListener('click', function(e){ e.stopPropagation(); deleteItem(orderId, item.id); });

  actions.appendChild(editBtn); actions.appendChild(delBtn); card.appendChild(actions);

  var imgWrap = document.createElement('div'); imgWrap.className = 'product-img-wrap';
  if (item.img) {
    var img = document.createElement('img'); img.src = item.img; img.alt = item.name; imgWrap.appendChild(img);
  } else {
    var noImg = document.createElement('div'); noImg.className = 'no-img';
    noImg.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>画像なし</span>';
    imgWrap.appendChild(noImg);
  }
  var badge = document.createElement('span'); badge.className = 'qty-badge'; badge.textContent = item.qty + '個';
  imgWrap.appendChild(badge); card.appendChild(imgWrap);

  var body = document.createElement('div'); body.className = 'product-body';
  var nameEl = document.createElement('div'); nameEl.className = 'product-name'; nameEl.textContent = item.name;
  body.appendChild(nameEl);
  if (item.price) {
    var pl = document.createElement('div'); pl.className = 'product-price-label'; pl.textContent = '販売価格';
    var pv = document.createElement('div'); pv.className = 'product-price'; pv.textContent = fmtPrice(item.price);
    body.appendChild(pl); body.appendChild(pv);
  }
  if (item.cost) {
    var ce = document.createElement('div'); ce.className = 'product-cost'; ce.textContent = '原価：' + fmtPrice(item.cost);
    body.appendChild(ce);
  }
  var qe = document.createElement('div'); qe.className = 'product-qty'; qe.textContent = '発注数：' + item.qty + '個';
  body.appendChild(qe);
  if (item.note) {
    var ne = document.createElement('div'); ne.className = 'product-note'; ne.textContent = '📝 ' + item.note;
    body.appendChild(ne);
  }
  card.appendChild(body);
  return card;
}

    .then(function(){

function deleteItem(orderId, itemId) {

    .then(function(){

/* ══════════════════════════════════════
   CSV
══════════════════════════════════════ */
function orderToRows(order) {
  var store = db.stores.find(function(s){ return s.id === order.storeId; });
  return order.items.map(function(item){
    return [store ? store.name : '', order.orderDate||'', order.deliveryDate||'',
            item.name, item.qty, item.price||'', item.cost||'', item.note||''];
  });
}
function downloadCSV(rows, filename) {
  var header = ['店舗名','発注日','納品予定日','商品名','発注個数','販売価格','原価','備考'];
  var csv = [header].concat(rows).map(function(row){
    return row.map(function(cell){
      var s = String(cell);
      if (s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0) s = '"' + s.replace(/"/g,'""') + '"';
      return s;
    }).join(',');
  }).join('\r\n');
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}
function exportCSVOrder(order) {
  var store = db.stores.find(function(s){ return s.id === order.storeId; });
  downloadCSV(orderToRows(order), (store?store.name:'店舗') + '_' + (order.orderDate||'発注') + '.csv');
}
function openCSVModal() {
  var list = document.getElementById('csv-store-checks'); list.innerHTML = '';
  db.stores.forEach(function(store){
    var item = document.createElement('div'); item.className = 'store-check-item';
    var cb = document.createElement('input'); cb.type = 'checkbox'; cb.id = 'csv-s-' + store.id; cb.value = store.id; cb.checked = true;
    cb.addEventListener('change', updateCSVPreview);
    var lbl = document.createElement('label'); lbl.setAttribute('for','csv-s-'+store.id); lbl.textContent = store.name;
    item.appendChild(cb); item.appendChild(lbl);
    item.addEventListener('click', function(e){ if(e.target!==cb) cb.click(); });
    list.appendChild(item);
  });
  document.getElementById('csv-date-from').value = '';
  document.getElementById('csv-date-to').value = '';
  document.getElementById('csv-overlay').classList.add('open');
  updateCSVPreview();
}
function getFilteredOrders() {
  var ids = Array.from(document.querySelectorAll('#csv-store-checks input:checked')).map(function(cb){ return cb.value; });
  var from = document.getElementById('csv-date-from').value;
  var to   = document.getElementById('csv-date-to').value;
  return db.orders.filter(function(o){
    if (ids.indexOf(o.storeId)<0) return false;
    if (from && o.orderDate < from) return false;
    if (to   && o.orderDate > to)   return false;
    return true;
  });
}
function updateCSVPreview() {
  var orders = getFilteredOrders();
  var total = orders.reduce(function(s,o){ return s+o.items.length; }, 0);
  var from = document.getElementById('csv-date-from').value;
  var to   = document.getElementById('csv-date-to').value;
  var prev = document.getElementById('csv-preview');
  prev.innerHTML = orders.length === 0 ? '該当する発注がありません' :
    '<strong>' + orders.length + '件</strong>の発注　<strong>' + total + '商品</strong>が出力されます<br>期間：' + (from||'開始') + ' 〜 ' + (to||'終了');
}
function execFilteredCSV() {
  var orders = getFilteredOrders();
  if (orders.length===0) { alert('該当する発注がありません。'); return; }
  var rows = []; orders.forEach(function(o){ rows = rows.concat(orderToRows(o)); });
  var from = document.getElementById('csv-date-from').value;
  var to   = document.getElementById('csv-date-to').value;
  downloadCSV(rows, '発注CSV_' + (from||'') + (from&&to?'_':'') + (to||'') + '.csv');
  document.getElementById('csv-overlay').classList.remove('open');
}

  editingItemId = itemId; _itemOrderId = orderId;

  var price = parseFloat(document.getElementById('f-price').value) || 0;

  if (qty < 1) { alert('発注個数を1以上で入力してください。'); return; }

  var order = db.orders.find(function(o){ return o.id === _itemOrderId; });
  if (!order) return;

  if (editingItemId) {
    var payload = { name:name, qty:qty, price:price, cost:cost, note:note };
    if (pendingImg) payload.img = pendingImg;
    sbFetch('order_items?id=eq.' + editingItemId, { method: 'PATCH', body: JSON.stringify(payload) })
      .then(function(){
        var item = order.items.find(function(i){ return i.id === editingItemId; });
        if (item) { item.name=name; item.qty=qty; item.price=price; item.cost=cost; item.note=note; if(pendingImg) item.img=pendingImg; }

  } else {
    var newId = uid();
    var sortOrder = order.items.length;
    sbFetch('order_items', { method: 'POST', body: JSON.stringify({
      id: newId, order_id: _itemOrderId, name:name, qty:qty, price:price, cost:cost,
      note:note, img: pendingImg||'', sort_order: sortOrder
    })}).then(function(){
      order.items.push({ id:newId, name:name, qty:qty, price:price, cost:cost, note:note, img:pendingImg||'' });

    }).catch(function(){});
  }
}, 30000);

// タブを切り替えて戻ってきたときに再取得
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    loadAll();
  }
});

}());
</script>
