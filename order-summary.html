<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発注サマリー</title>
<style>
  :root {
    --primary: #1a1a2e;
    --accent: #4f8ef7;
    --accent-light: #eef3fe;
    --bg: #f6f8fc;
    --card: #ffffff;
    --border: #e2e8f4;
    --text: #1a202c;
    --muted: #718096;
    --success: #38a169;
    --success-bg: #f0fff4;
    --danger: #e53e3e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ======= HEADER ======= */
  header {
    background: var(--primary);
    color: #fff;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.03em; }
  header .meta { font-size: 13px; opacity: 0.65; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,.45); }
  .btn-outline:hover { background: rgba(255,255,255,.1); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 11px; font-size: 12px; }

  /* ======= ORDER INFO BAR ======= */
  .info-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    align-items: center;
  }
  .info-field { display: flex; flex-direction: column; gap: 2px; }
  .info-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
  .info-value { font-size: 14px; font-weight: 600; color: var(--text); }

  /* ======= SUMMARY CARDS ======= */
  .summary-row {
    display: flex;
    gap: 16px;
    padding: 20px 32px 0;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    min-width: 140px;
  }
  .stat-card .label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .05em; margin-bottom: 4px; }
  .stat-card .value { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-card .value.accent { color: var(--accent); }
  .stat-card .value.success { color: var(--success); }

  /* ======= MAIN CONTENT ======= */
  main { padding: 20px 32px 40px; }

  /* ======= PRODUCT GRID ======= */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }
  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: box-shadow .2s;
    position: relative;
  }
  .product-card:hover { box-shadow: 0 4px 20px rgba(79,142,247,.12); }
  .product-img-wrap {
    width: 100%;
    aspect-ratio: 1/1;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .product-img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .product-img-wrap .no-img {
    font-size: 36px; color: #c0cce0; user-select: none;
  }
  .qty-badge {
    position: absolute; top: 10px; right: 10px;
    background: var(--accent); color: #fff;
    font-size: 13px; font-weight: 700;
    border-radius: 20px; padding: 3px 10px;
    line-height: 1.4;
  }
  .product-body { padding: 12px 14px 14px; }
  .product-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .product-detail { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; margin-top: 4px; }
  .product-total { font-size: 15px; font-weight: 700; color: var(--accent); margin-top: 8px; }
  .product-note { font-size: 11px; color: var(--muted); margin-top: 6px; background: var(--bg); border-radius: 6px; padding: 5px 8px; }
  .del-btn {
    position: absolute; top: 8px; left: 8px;
    background: rgba(229,62,62,.85); color: #fff;
    border: none; border-radius: 50%; width: 24px; height: 24px;
    font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .15s;
  }
  .product-card:hover .del-btn { opacity: 1; }

  /* ======= TOTAL BAR ======= */
  .total-bar {
    margin-top: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 32px;
  }
  .total-bar .t-label { font-size: 13px; color: var(--muted); }
  .total-bar .t-value { font-size: 20px; font-weight: 700; color: var(--text); }
  .total-bar .t-value.big { font-size: 26px; color: var(--accent); }

  /* ======= ADD MODAL ======= */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45); z-index: 100;
    align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 16px;
    padding: 28px 28px 24px; width: 92%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing:.04em; }
  .form-group input, .form-group textarea {
    width: 100%; border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; font-size: 14px; font-family: inherit;
    background: var(--bg); color: var(--text);
    outline: none; transition: border .15s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); background: #fff; }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

  /* preview image in modal */
  #img-preview { max-width: 100%; max-height: 120px; border-radius: 8px; margin-top: 8px; display: none; }

  /* ======= EMPTY STATE ======= */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ======= SECTION HEADER ======= */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 4px;
  }
  .section-header h2 { font-size: 15px; font-weight: 700; }

  /* PRINT */
  @media print {
    .btn, .del-btn, .add-section, header .btn, .overlay { display: none !important; }
    body { background: #fff; }
    .product-grid { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 600px) {
    header, .info-bar, main, .summary-row { padding-left: 16px; padding-right: 16px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <h1 id="order-title">📦 発注サマリー</h1>
    <div class="meta" id="order-date-display"></div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-outline btn-sm" onclick="window.print()">🖨️ 印刷</button>
    <button class="btn btn-primary btn-sm" onclick="openModal()">＋ 商品を追加</button>
  </div>
</header>

<!-- ORDER INFO BAR -->
<div class="info-bar">
  <div class="info-field">
    <span class="info-label">発注者</span>
    <span class="info-value" id="display-orderer">—</span>
  </div>
  <div class="info-field">
    <span class="info-label">発注日</span>
    <span class="info-value" id="display-order-date">—</span>
  </div>
  <div class="info-field">
    <span class="info-label">納品予定日</span>
    <span class="info-value" id="display-delivery-date">—</span>
  </div>
  <div style="margin-left:auto">
    <button class="btn btn-outline btn-sm" style="color:var(--muted);border-color:var(--border)" onclick="openInfoModal()">✏️ 発注情報を編集</button>
  </div>
</div>

<!-- SUMMARY CARDS -->
<div class="summary-row">
  <div class="stat-card">
    <div class="label">商品種類数</div>
    <div class="value accent" id="stat-types">0</div>
  </div>
  <div class="stat-card">
    <div class="label">総発注個数</div>
    <div class="value" id="stat-qty">0</div>
  </div>
  <div class="stat-card">
    <div class="label">合計金額</div>
    <div class="value success" id="stat-total">¥0</div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="section-header">
    <h2>発注商品一覧</h2>
  </div>

  <div class="product-grid" id="product-grid">
    <div class="empty-state" id="empty-state" style="grid-column:1/-1">
      <div class="icon">📋</div>
      <p>商品がまだ追加されていません<br>「＋ 商品を追加」から登録してください</p>
    </div>
  </div>

  <div class="total-bar" id="total-bar" style="display:none">
    <div>
      <div class="t-label">商品合計</div>
      <div class="t-value" id="total-items">¥0</div>
    </div>
    <div style="width:1px;height:32px;background:var(--border)"></div>
    <div>
      <div class="t-label">税込合計（10%）</div>
      <div class="t-value big" id="total-tax">¥0</div>
    </div>
  </div>
</main>

<!-- ADD PRODUCT MODAL -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <h2>商品を追加</h2>
    <div class="form-group">
      <label>商品名 *</label>
      <input type="text" id="f-name" placeholder="例: ボールペン（黒）10本セット">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>発注個数 *</label>
        <input type="number" id="f-qty" min="1" placeholder="1">
      </div>
      <div class="form-group">
        <label>単価（円）</label>
        <input type="number" id="f-price" min="0" placeholder="0">
      </div>
    </div>
    <div class="form-group">
      <label>商品画像URL（任意）</label>
      <input type="url" id="f-img" placeholder="https://..." oninput="previewImg(this.value)">
      <img id="img-preview" src="" alt="preview">
    </div>
    <div class="form-group">
      <label>備考・メモ（任意）</label>
      <textarea id="f-note" placeholder="カラー・サイズ・規格など"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" style="color:var(--text);border-color:var(--border)" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="addProduct()">追加する</button>
    </div>
  </div>
</div>

<!-- ORDER INFO MODAL -->
<div class="overlay" id="info-modal-overlay">
  <div class="modal">
    <h2>発注情報を編集</h2>
    <div class="form-group">
      <label>発注者名</label>
      <input type="text" id="fi-orderer" placeholder="山田 太郎">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>発注日</label>
        <input type="date" id="fi-order-date">
      </div>
      <div class="form-group">
        <label>納品予定日</label>
        <input type="date" id="fi-delivery-date">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" style="color:var(--text);border-color:var(--border)" onclick="closeInfoModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveInfo()">保存</button>
    </div>
  </div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('order_products') || '[]');
let orderInfo = JSON.parse(localStorage.getItem('order_info') || '{}');

function save() {
  localStorage.setItem('order_products', JSON.stringify(products));
  localStorage.setItem('order_info', JSON.stringify(orderInfo));
}

function fmt(n) {
  return '¥' + Math.round(n).toLocaleString('ja-JP');
}

function fmtDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
}

function render() {
  const grid = document.getElementById('product-grid');
  const empty = document.getElementById('empty-state');
  grid.innerHTML = '';

  if (products.length === 0) {
    grid.appendChild(empty);
    document.getElementById('total-bar').style.display = 'none';
  } else {
    document.getElementById('total-bar').style.display = 'flex';
    products.forEach((p, i) => {
      const subtotal = (p.qty || 0) * (p.price || 0);
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <button class="del-btn" onclick="removeProduct(${i})" title="削除">×</button>
        <div class="product-img-wrap">
          ${p.img
            ? `<img src="${p.img}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''}
          <div class="no-img" style="${p.img ? 'display:none' : ''}">📦</div>
          <span class="qty-badge">${p.qty}個</span>
        </div>
        <div class="product-body">
          <div class="product-name">${p.name}</div>
          ${p.price ? `
            <div class="product-detail">
              <span>単価</span><span>${fmt(p.price)}</span>
            </div>
            <div class="product-detail">
              <span>個数</span><span>${p.qty}個</span>
            </div>
            <div class="product-total">${fmt(subtotal)}</div>
          ` : `
            <div class="product-detail"><span>個数</span><span>${p.qty}個</span></div>
          `}
          ${p.note ? `<div class="product-note">📝 ${p.note}</div>` : ''}
        </div>`;
      grid.appendChild(card);
    });
  }

  // stats
  const totalQty = products.reduce((s, p) => s + (p.qty || 0), 0);
  const totalAmt = products.reduce((s, p) => s + (p.qty || 0) * (p.price || 0), 0);
  document.getElementById('stat-types').textContent = products.length;
  document.getElementById('stat-qty').textContent = totalQty;
  document.getElementById('stat-total').textContent = fmt(totalAmt);
  document.getElementById('total-items').textContent = fmt(totalAmt);
  document.getElementById('total-tax').textContent = fmt(totalAmt * 1.1);

  // header date
  document.getElementById('order-date-display').textContent =
    orderInfo.orderDate ? '発注日: ' + fmtDate(orderInfo.orderDate) : '';
}

function renderInfo() {
  document.getElementById('display-orderer').textContent = orderInfo.orderer || '—';
  document.getElementById('display-order-date').textContent = fmtDate(orderInfo.orderDate);
  document.getElementById('display-delivery-date').textContent = fmtDate(orderInfo.deliveryDate);
}

/* === modal open/close === */
function openModal() {
  document.getElementById('f-name').value = '';
  document.getElementById('f-qty').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-img').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-name').focus();
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function openInfoModal() {
  document.getElementById('fi-orderer').value = orderInfo.orderer || '';
  document.getElementById('fi-order-date').value = orderInfo.orderDate || '';
  document.getElementById('fi-delivery-date').value = orderInfo.deliveryDate || '';
  document.getElementById('info-modal-overlay').classList.add('open');
}
function closeInfoModal() { document.getElementById('info-modal-overlay').classList.remove('open'); }

/* === image preview === */
function previewImg(url) {
  const el = document.getElementById('img-preview');
  if (url) { el.src = url; el.style.display = 'block'; }
  else { el.style.display = 'none'; }
}

/* === add product === */
function addProduct() {
  const name = document.getElementById('f-name').value.trim();
  const qty = parseInt(document.getElementById('f-qty').value) || 0;
  if (!name || qty < 1) {
    alert('商品名と発注個数は必須です。');
    return;
  }
  products.push({
    name,
    qty,
    price: parseFloat(document.getElementById('f-price').value) || 0,
    img: document.getElementById('f-img').value.trim(),
    note: document.getElementById('f-note').value.trim(),
  });
  save(); render(); closeModal();
}

function removeProduct(i) {
  if (!confirm('この商品を削除しますか？')) return;
  products.splice(i, 1);
  save(); render();
}

function saveInfo() {
  orderInfo.orderer = document.getElementById('fi-orderer').value.trim();
  orderInfo.orderDate = document.getElementById('fi-order-date').value;
  orderInfo.deliveryDate = document.getElementById('fi-delivery-date').value;
  save(); renderInfo(); closeInfoModal();
}

/* close on overlay click */
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('info-modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeInfoModal();
});

// init
render();
renderInfo();
</script>
</body>
</html>
